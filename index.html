<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/?size=32&id=OFHwDWASQWmX&format=png&color=000000">
<link rel="icon" type="image/png" sizes="16x16" href="https://img.icons8.com/?size=16&id=OFHwDWASQWmX&format=png&color=000000">
<title>LEE Coin Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#000000,#1a0000);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dashboard{
    width:95%;
    max-width:1100px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    font-weight:800;
    background:linear-gradient(90deg,#ff3c00,#ff7b00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.back-btn{
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#ff3c00,#ff7b00);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(255,60,0,0.6);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,60,0,0.3);
    transition:0.4s;
    transform-style:preserve-3d;
}

.card:hover{
    transform:rotateX(8deg) rotateY(-8deg) scale(1.05);
    box-shadow:0 25px 40px rgba(255,60,0,0.4);
}

.balance h2{
    font-weight:600;
    margin-bottom:10px;
    color:#ff7b00;
}

.balance .amount{
    font-size:2.5rem;
    font-weight:800;
}

.user{
    margin-top:15px;
    font-size:0.9rem;
    opacity:0.8;
}

.graph-card h2{
    margin-bottom:15px;
    color:#ff7b00;
}

canvas{
    width:100%!important;
    height:250px!important;
}

.footer{
    margin-top:30px;
    text-align:center;
    opacity:0.5;
    font-size:0.8rem;
}

.withdraw-btn{
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#ff3c00,#ff7b00);
    color:white;
    font-weight:600;
    display:inline-block;
    transition:0.3s;
    margin-top:12px;
}

.withdraw-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(255,60,0,0.6);
    background:linear-gradient(135deg,#ff3c00,#ff0000,#ffff00);
}
</style>
</head>
<body>

<div class="dashboard">

    <div class="header">
        <h1>LEE Coin Members Dashboard</h1>
        <a href="https://tycoon-x32.github.io/LEE.co/" class="back-btn">Back to Main Page</a>
    </div>

    <div class="cards">

        <div class="card balance">
            <h2>Wallet Balance</h2>
            <div class="amount" id="coinAmount">4 LEE COIN</div>
            <div class="user" id="holder">Holder: Mohammed Osman</div>
            <div class="user" id="ownerHolds">Owner Holds: 4 LEE COIN</div>

            <div style="margin-top:18px;">
                <button class="withdraw-btn" id="withdrawRequestBtn">Withdraw</button>
            </div>
        </div>

        <div class="card graph-card">
            <h2>Market Growth</h2>
            <canvas id="priceChart"></canvas>
        </div>

    </div>

    <div class="footer">
        LEE COIN • Premium Member Access
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- date adapter needed for time scale -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<!-- financial chart plugin: candlestick/ohlc -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
<script>
// candlestick chart showing OHLC data fetched from CoinGecko
const chartCtx = document.getElementById('priceChart').getContext('2d');
let candleChart;

function createCandleChart(data) {
    candleChart = new Chart(chartCtx, {
        type: 'candlestick',
        data: {
            datasets: [{
                label: 'LEE USD OHLC',
                data: data,
                color: {
                    up: '#4caf50',
                    down: '#f44336',
                    unchanged: '#999'
                }
            }]
        },
        options: {
            plugins: {
                legend: { labels: { color: 'white' } }
            },
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'hour' },
                    ticks: { color: 'white' }
                },
                y: {
                    ticks: { color: 'white' },
                    beginAtZero: false
                }
            }
        }
    });
}

async function fetchOhlc() {
    try {
        // CoinGecko provides OHLC endpoint: days parameter can be 1,7,14,30,90,180,365,max
        const res = await fetch('https://api.coingecko.com/api/v3/coins/lee-coin/ohlc?vs_currency=usd&days=1');
        const json = await res.json();
        console.log('OHLC response', json);
        // some coin ids may not exist; if empty, provide dummy data so chart renders
        let formatted;
        if (Array.isArray(json) && json.length) {
            formatted = json.map(item => ({
                x: item[0],
                o: item[1],
                h: item[2],
                l: item[3],
                c: item[4]
            }));
        } else {
            console.warn('no OHLC data returned, using mock values');
            const now = Date.now();
            // price currently around $3, make some fake candles near that level
            formatted = [
                {x: now - 3600000*5, o:2.9,h:3.05,l:2.85,c:3.0},
                {x: now - 3600000*4, o:3.0,h:3.1,l:2.95,c:3.02},
                {x: now - 3600000*3, o:3.02,h:3.08,l:3.0,c:3.05},
                {x: now - 3600000*2, o:3.05,h:3.1,l:3.03,c:3.09},
                {x: now - 3600000, o:3.09,h:3.15,l:3.08,c:3.12}
            ];
        }
        createCandleChart(formatted);
    } catch (err) {
        console.error('ohlc fetch failed', err);
    }
}

fetchOhlc();
// refresh every minute if you want live updates
setInterval(fetchOhlc, 60000);
</script>

</body>

</html>
